<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Health Chatbot - Your friendly AI health assistant for general health information">
    <title>Health Chatbot</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <!-- Main Application Container -->
    <div class="container">
        <!-- Application Header -->
        <header>
            <h1>Health Chatbot</h1>
            <p>Your friendly health assistant</p>
        </header>
        
        <!-- Chat Interface -->
        <div class="chat-container">
            <!-- Message Display Area -->
            <div id="chat-messages" class="chat-messages" aria-live="polite">
                <!-- Initial Greeting Message -->
                <div class="message bot-message">
                    <div class="message-content">
                        Hello! I'm your health assistant. How can I help you today?
                    </div>
                </div>
            </div>
            
            <!-- Input Area -->
            <div class="input-container">
                <form id="chat-form" aria-label="Chat input form">
                    <input 
                        type="text" 
                        id="user-input" 
                        name="message"
                        placeholder="Type your health question here..." 
                        autocomplete="off"
                        required
                        aria-label="Type your message"
                    >
                    <button type="submit" id="send-button" aria-label="Send message">
                        <span>Send</span>
                    </button>
                </form>
                <button id="clear-button" class="clear-button" aria-label="Clear chat history">
                    Clear Chat
                </button>
            </div>
        </div>
        
        <!-- Warning Banner for Safety Alerts -->
        <div id="warning-banner" class="warning-banner hidden" role="alert" aria-live="assertive"></div>
        
        <!-- Footer -->
        <footer class="footer">
            <p>Developed by Haris Hussain</p>
        </footer>
    </div>
    
    <!-- Frontend JavaScript -->
    <script src="{{ url_for('static', filename='js/chat.js') }}"></script>
</body>
</html>
